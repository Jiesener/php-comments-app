<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交内容</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%}
h1{color:#333;margin-bottom:30px;font-size:24px;text-align:center}
.bar{text-align:center;margin-bottom:20px}
.bar span{background:#f8f9fa;padding:6px 14px;border-radius:20px;font-size:13px;color:#666;display:inline-block;margin:0 6px}
.bar strong{color:#11998e}
.msg{padding:15px;border-radius:10px;margin-bottom:20px;text-align:center;font-weight:bold}
.msg.success{background:#d4edda;color:#155724}
.msg.error{background:#f8d7da;color:#721c24}
textarea{width:100%;height:200px;padding:15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;resize:vertical;margin-bottom:20px;font-family:inherit}
textarea:focus{outline:none;border-color:#11998e}
.hint{color:#666;font-size:14px;margin-bottom:20px;text-align:center}
.lc{text-align:right;font-size:12px;color:#aaa;margin-top:-12px;margin-bottom:16px}
button{width:100%;padding:15px 30px;background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer;transition:transform .2s,box-shadow .2s}
button:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(17,153,142,.4)}
button:disabled{opacity:.5;cursor:not-allowed}
.nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
.nav a{color:#666;text-decoration:none;font-size:14px}
.nav a:hover{color:#333}
</style>
</head>
<body>
<div class="container">
<h1>📝 提交内容</h1>
<div class="bar"><span>📌 云端 <strong id="count">-</strong> 条</span><span>⚠️ 提交将替换所有旧内容</span></div>
<div class="msg" id="msg" style="display:none"></div>
<textarea id="inp" placeholder="输入多条内容，每行一条&#10;例如：&#10;这条评论说的太对了&#10;支持！说的好" required></textarea>
<div class="lc" id="lc">0 行</div>
<div class="hint">💡 每行一条内容，提交后会替换所有旧内容</div>
<button type="button" id="subBtn" onclick="doSubmit()">📤 提交内容</button>
<div class="nav"><a href="index.html">← 返回复制页面</a></div>
</div>

<script>
var AK='$2a$10$mN/qxmnMyWObfCIw7cZokuvM1jSfeZ7u1zLt8yqTLlaMztS3hsvqm';
var BIN='6a4490d2da38895dfe198314';

function save(arr){return fetch('https://api.jsonbin.io/v3/b/'+BIN,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':AK},body:JSON.stringify({comments:arr})}).then(function(){return true}).catch(function(){return false})}
function showMsg(t,c){var e=document.getElementById('msg');e.textContent=t;e.className='msg '+c;e.style.display='block';setTimeout(function(){e.style.display='none'},5000)}

fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':AK}}).then(function(r){return r.json()}).then(function(d){document.getElementById('count').textContent=(d.record||{}).comments?d.record.comments.length:0}).catch(function(){document.getElementById('count').textContent='?'})

function doSubmit(){
  var lines=document.getElementById('inp').value.split('\n');
  var arr=[];
  for(var i=0;i<lines.length;i++){var t=lines[i].trim();if(t)arr.push(t.substring(0,500))}
  if(arr.length===0){showMsg('❌ 请输入至少一条内容','error');return}
  var btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='⏳ 保存中...';
  save(arr).then(function(ok){
    if(ok){document.getElementById('count').textContent=arr.length;showMsg('✅ 成功提交 '+arr.length+' 条内容！','success');document.getElementById('inp').value='';document.getElementById('lc').textContent='0 行'}
    else{showMsg('❌ 提交失败，请稍后再试','error')}
    btn.disabled=false;btn.textContent='📤 提交内容';
  });
}

document.getElementById('inp').addEventListener('input',function(){var n=this.value.split('\n').filter(function(l){return l.trim()}).length;document.getElementById('lc').textContent=n+' 行'});
</script>
</body>
</html>
